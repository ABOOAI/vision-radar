<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISION 幻视雷达 | 2026 旗舰版</title>
    <style>
        /* --- 核心：雷达背景设计 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        
        body {
            width: 100vw; height: 100vh;
            background-color: #020603; /* 深邃的绿黑底色 */
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden; color: #fff;
            position: relative;
        }

        /* 雷达静态网格层 */
        .radar-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
            background-image: 
                linear-gradient(rgba(0, 255, 64, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 64, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* 雷达扫描 Canvas 层 */
        #radar-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
            opacity: 0.6; /* 调整扫描亮度 */
        }

        /* 背景中心发光 */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 255, 64, 0.04) 0%, transparent 70%);
            z-index: 3; pointer-events: none;
        }

        /* --- 主 UI 内容区 --- */
        .main-ui { 
            position: relative; z-index: 10; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* 状态切换：点击验证后主屏缩放 blur */
        .main-ui.active { transform: scale(0.85); filter: blur(12px); opacity: 0.2; }

        .content-wrapper { position: relative; padding: 120px; text-align: center; }

        /* --- 保留：四角环绕文字排版 --- */
        .slogan-tag { 
            position: absolute; font-size: 14px; color: rgba(255, 255, 255, 0.5); 
            letter-spacing: 4px; display: flex; flex-direction: column; align-items: center;
        }
        /* 装饰小线条 */
        .slogan-tag::after {
            content: ''; width: 1px; height: 35px;
            background: linear-gradient(to bottom, #00ff00, transparent);
            margin-top: 10px;
        }

        .tag-tl { top: 0; left: 0; }
        .tag-tr { top: 0; right: 0; }
        .tag-bl { bottom: 0; left: 0; flex-direction: column-reverse; } /* 线条向上 */
        .tag-bl::after { margin-bottom: 10px; background: linear-gradient(to top, #00ff00, transparent); }
        .tag-br { bottom: 0; right: 0; flex-direction: column-reverse; } /* 线条向上 */
        .tag-br::after { margin-bottom: 10px; background: linear-gradient(to top, #00ff00, transparent); }

        /* Logo 核心区域 */
        .logo-area { display: flex; align-items: center; justify-content: center; margin-bottom: 50px; }
        .vision-text { font-size: 80px; font-weight: bold; letter-spacing: 5px; color: #fff; }
        .pink-dot { 
            width: 12px; height: 12px; background: #eb007f; border-radius: 50%; 
            margin: 0 25px; box-shadow: 0 0 20px #eb007f; 
            animation: pulse 2s infinite; 
        }
        .huanshi-text { 
            font-size: 75px; color: #00ff00; font-weight: bold; 
            letter-spacing: 10px; text-shadow: 0 0 25px rgba(0,255,0,0.6); 
        }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.7; } }

        /* 按钮组 */
        .btn-group { display: flex; gap: 30px; justify-content: center; }
        .btn {
            padding: 16px 50px; border-radius: 50px; background: rgba(0,0,0,0.6); 
            border: 1px solid transparent; color: #fff; text-decoration: none; 
            font-size: 18px; transition: 0.4s; backdrop-filter: blur(10px);
            cursor: pointer; position: relative; overflow: hidden;
        }
        /* 扫光动画 */
        .btn::after {
            content: ''; position: absolute; top: -50%; left: -100%; width: 50%; height: 200%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(30deg); animation: shine 4s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 20% { left: 150%; } 100% { left: 150%; } }

        .btn-verify { border-color: #eb007f; box-shadow: 0 0 15px rgba(235,0,127,0.3); }
        .btn-verify:hover { background: #eb007f; color: #fff; box-shadow: 0 0 40px #eb007f; }
        
        .btn-download { border-color: #00ff00; box-shadow: 0 0 15px rgba(0,255,64,0.2); }
        .btn-download:hover { background: #00ff00; color: #000; box-shadow: 0 0 40px #00ff00; }

        /* --- 验证终端弹出覆盖层 --- */
        .verify-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: none; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        .overlay-mask { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); z-index: -1; }

        .verify-card {
            width: 460px; background: #080d09; border: 1px solid rgba(0, 255, 64, 0.2);
            padding: 50px; text-align: center; border-radius: 20px;
            box-shadow: 0 0 100px rgba(0,0,0,1), 0 0 20px rgba(0,255,64,0.1);
            animation: cardSlideIn 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        @keyframes cardSlideIn { from { opacity:0; transform: translateY(50px); } to { opacity:1; transform: translateY(0); } }

        .verify-title { color: #eb007f; font-size: 20px; letter-spacing: 6px; margin-bottom: 30px; font-weight: bold; text-transform: uppercase; }
        
        /* 备用直达区 */
        .fallback-box {
            margin-top: 35px; padding-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .link-text { color: #00ff40; text-decoration: underline; font-size: 13px; cursor: pointer; transition: 0.3s; opacity: 0.7; }
        .link-text:hover { opacity: 1; text-shadow: 0 0 10px #00ff40; }

    </style>
</head>
<body>

    <div class="radar-grid"></div>
    <canvas id="radar-canvas"></canvas>
    <div class="bg-glow"></div>

    <div class="main-ui" id="mainUI">
        <div class="content-wrapper">
            <div class="slogan-tag tag-tl">极速响应 // 01</div>
            <div class="slogan-tag tag-tr">毫秒现形 // 02</div>
            <div class="slogan-tag tag-bl">多重防护 // 03</div>
            <div class="slogan-tag tag-br">稳如磐石 // 04</div>

            <div class="logo-area">
                <div class="vision-text">VISION</div>
                <div class="pink-dot"></div>
                <div class="huanshi-text">幻视雷达</div>
            </div>

            <div class="btn-group">
                <div class="btn btn-verify" onclick="toggleOverlay(true)">验证卡密</div>
                <a href="#" class="btn btn-download">下载教程</a>
            </div>
        </div>
    </div>

    <div class="verify-overlay" id="verifyOverlay">
        <div class="overlay-mask" onclick="toggleOverlay(false)"></div>
        <div class="verify-card">
            <div class="verify-title">SECURITY TERMINAL</div>
            
            <p style="color: #999; margin-bottom: 35px; font-size: 14px; line-height: 1.6; padding: 0 10px;">
                系统初始化完成。点击下方按钮将载入验证窗口。<br>
                <span style="color: #eb007f; font-weight: bold;">若被浏览器拦截（点击无效），请使用直达链接。</span>
            </p>
            
            <div class="btn btn-verify" style="display: block; width: 100%; margin-bottom: 25px;" onclick="attemptOpenWin()">
                启动验证窗口
            </div>

            <div class="fallback-box">
                <p style="font-size: 12px; color: #666; margin-bottom: 12px;">弹窗遭拦截？尝试备用方案：</p>
                <a href="http://ayuuyy.lewhqh.cn/59188" target="_blank" class="link-text">直接在本窗口打开 (直达)</a>
            </div>

            <div style="margin-top: 40px; font-size: 12px; color: rgba(255,255,255,0.3); cursor: pointer;" onclick="toggleOverlay(false)">
                [ 返回主界面 ]
            </div>
        </div>
    </div>

    <script>
        // --- 交互逻辑 ---
        function toggleOverlay(show) {
            const ui = document.getElementById('mainUI');
            const overlay = document.getElementById('verifyOverlay');
            if(show) {
                ui.classList.add('active');
                overlay.style.display = 'flex';
            } else {
                ui.classList.remove('active');
                overlay.style.display = 'none';
            }
        }

        function attemptOpenWin() {
            // 尝试开启弹出窗口（模拟程序直达）
            const win = window.open('http://ayuuyy.lewhqh.cn/59188', 'VisionTerminal', 'width=450,height=600,top=100,left=100,toolbar=no,menubar=no,scrollbars=yes,resizable=yes');
            
            // 检查是否被拦截
            if(!win || win.closed || typeof win.closed == 'undefined') {
                // 拦截后，不关闭面板，让用户使用备用链接
                alert('弹窗被浏览器拦截，请点击面板下方的“直达链接”直接打开。');
            } else {
                // 成功弹出，关闭面板
                toggleOverlay(false);
            }
        }

        // --- 核心背景：雷达扫描 Canvas 动效 ---
        const canvas = document.getElementById('radar-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, angle = 0, targets = [];

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            // 重新初始化目标点，使其分布在新视口内
            initTargets();
        }

        function initTargets() {
            targets = [];
            // 生成一些随机的雷达“目标点”
            for(let i=0; i<6; i++) {
                targets.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    opacity: Math.random(), // 初始透明度
                    life: Math.random() * 100 + 100 // 生命周期
                });
            }
        }

        function drawRadar() {
            ctx.clearRect(0,0,w,h);
            const cx = w/2, cy = h/2, maxR = Math.hypot(w,h);

            // 1. 绘制缓慢旋转的扫描扇形 (Cyber Green)
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);
            
            // 创建径向渐变，形成余辉效果
            let grad = ctx.createRadialGradient(0,0,0,0,0, maxR);
            grad.addColorStop(0, 'rgba(0, 255, 64, 0.2)'); // 中心较亮
            grad.addColorStop(0.5, 'rgba(0, 255, 64, 0.05)'); // 中间较淡
            grad.addColorStop(1, 'transparent'); // 边缘透明

            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(0,0);
            // 弧度范围，形成扫描扇形
            ctx.arc(0,0, maxR, 0, Math.PI / 3, false); 
            ctx.fill();
            ctx.restore();

            // 扫描角度递增（控制旋转速度）
            angle += 0.005; 

            // 2. 绘制随机闪烁的雷达“目标点”
            targets.forEach((t, i) => {
                ctx.fillStyle = `rgba(0, 255, 64, ${t.opacity})`;
                ctx.beginPath();
                ctx.arc(t.x, t.y, 1.5, 0, Math.PI*2);
                ctx.fill();
                
                // 目标点生命周期管理，模拟闪烁
                t.life--;
                if(t.life < 0) {
                    targets[i] = { x: Math.random()*w, y: Math.random()*h, opacity: Math.random(), life: Math.random()*100 + 100 };
                } else {
                    // 随着时间推移改变透明度
                    t.opacity += (Math.random()-0.5) * 0.1;
                    if(t.opacity < 0) t.opacity = 0;
                    if(t.opacity > 0.6) t.opacity = 0.6;
                }
            });

            requestAnimationFrame(drawRadar);
        }

        window.addEventListener('resize', resize);
        resize(); // 初始化尺寸和目标点
        drawRadar(); // 开始动画
    </script>
</body>
</html>
