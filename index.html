<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISION 幻视雷达 | 2026 旗舰版</title>
    <style>
        :root {
            --primary-green: #00ff40;
            --accent-pink: #eb007f;
            --bg-dark: #020603;
            --glass-bg: rgba(8, 13, 9, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        
        body {
            width: 100vw; height: 100vh;
            background-color: var(--bg-dark);
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            overflow: hidden; color: #fff;
            position: relative;
        }

        /* --- 背景层优化 --- */
        .radar-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
            background-image: 
                linear-gradient(rgba(0, 255, 64, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 64, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle, black 30%, transparent 80%);
        }

        /* 模拟扫描线滤镜 */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%;
            z-index: 20; pointer-events: none;
        }

        #radar-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; opacity: 0.8;
        }

        /* --- 主 UI 容器 --- */
        .main-ui { 
            position: relative; z-index: 10; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }
        
        .main-ui.active { transform: scale(0.92); filter: blur(20px); opacity: 0.3; }

        .content-wrapper { 
            position: relative; 
            width: 90%; max-width: 1200px;
            padding: 2rem;
            text-align: center; 
        }

        /* --- 角部装饰：自动适配间距 --- */
        .slogan-tag { 
            position: absolute; font-size: clamp(10px, 2vw, 14px); 
            color: rgba(255, 255, 255, 0.4); 
            letter-spacing: 2px; display: flex; flex-direction: column; align-items: center;
            text-transform: uppercase;
        }
        .slogan-tag::after {
            content: ''; width: 1px; height: 30px;
            background: linear-gradient(to bottom, var(--primary-green), transparent);
            margin-top: 8px;
        }

        .tag-tl { top: -20px; left: 0; }
        .tag-tr { top: -20px; right: 0; }
        .tag-bl { bottom: -20px; left: 0; flex-direction: column-reverse; }
        .tag-bl::after { margin: 0 0 8px 0; background: linear-gradient(to top, var(--primary-green), transparent); }
        .tag-br { bottom: -20px; right: 0; flex-direction: column-reverse; }
        .tag-br::after { margin: 0 0 8px 0; background: linear-gradient(to top, var(--primary-green), transparent); }

        /* --- Logo 区域优化 --- */
        .logo-area { 
            display: flex; flex-wrap: wrap; align-items: center; justify-content: center; 
            margin-bottom: clamp(30px, 8vh, 60px); 
        }
        .vision-text { 
            font-size: clamp(40px, 10vw, 90px); 
            font-weight: 900; letter-spacing: -2px; color: #fff; 
            background: linear-gradient(180deg, #fff 40%, #888 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .pink-dot { 
            width: clamp(8px, 1.5vw, 15px); height: clamp(8px, 1.5vw, 15px); 
            background: var(--accent-pink); border-radius: 50%; 
            margin: 0 clamp(15px, 3vw, 30px); 
            box-shadow: 0 0 30px var(--accent-pink); 
            animation: pulse 2s infinite; 
        }
        .huanshi-text { 
            font-size: clamp(35px, 9vw, 85px); color: var(--primary-green); font-weight: bold; 
            letter-spacing: clamp(5px, 1vw, 12px); 
            text-shadow: 0 0 30px rgba(0,255,64,0.5); 
        }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.3); filter: brightness(1.5); } }

        /* --- 按钮优化 --- */
        .btn-group { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 14px 45px; border-radius: 4px; background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.1); color: #fff; text-decoration: none; 
            font-size: 16px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(5px); cursor: pointer; position: relative;
            overflow: hidden; letter-spacing: 2px;
        }
        
        .btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }
        .btn:hover::before { left: 100%; }

        .btn-verify { border-color: var(--accent-pink); color: var(--accent-pink); }
        .btn-verify:hover { background: var(--accent-pink); color: #fff; box-shadow: 0 0 30px var(--accent-pink); }
        
        .btn-download { border-color: var(--primary-green); color: var(--primary-green); }
        .btn-download:hover { background: var(--primary-green); color: #000; box-shadow: 0 0 30px var(--primary-green); }

        /* --- 验证终端弹窗 --- */
        .verify-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: none; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        .overlay-mask { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); }

        .verify-card {
            position: relative; width: 90%; max-width: 440px; 
            background: var(--glass-bg); border: 1px solid rgba(0, 255, 64, 0.2);
            padding: clamp(30px, 5vw, 50px); text-align: center; border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: cardIn 0.5s forwards;
        }
        @keyframes cardIn { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .verify-title { color: var(--accent-pink); font-size: 18px; letter-spacing: 5px; margin-bottom: 25px; font-weight: bold; }
        .link-text { color: var(--primary-green); text-decoration: none; font-size: 13px; opacity: 0.8; transition: 0.3s; }
        .link-text:hover { opacity: 1; text-shadow: 0 0 10px var(--primary-green); }

        @media (max-width: 600px) {
            .slogan-tag { display: none; } /* 移动端隐藏角标以保持清爽 */
            .btn { width: 100%; padding: 12px 0; }
            .btn-group { width: 100%; flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="radar-grid"></div>
    <canvas id="radar-canvas"></canvas>

    <div class="main-ui" id="mainUI">
        <div class="content-wrapper">
            <div class="slogan-tag tag-tl">Ultra Response // 01</div>
            <div class="slogan-tag tag-tr">Real-time Vision // 02</div>
            <div class="slogan-tag tag-bl">Multi-Shield // 03</div>
            <div class="slogan-tag tag-br">Stable Kernel // 04</div>

            <div class="logo-area">
                <div class="vision-text">VISION</div>
                <div class="pink-dot"></div>
                <div class="huanshi-text">幻视雷达</div>
            </div>

            <div class="btn-group">
                <div class="btn btn-verify" onclick="toggleOverlay(true)">验证卡密密钥</div>
                <a href="#" class="btn btn-download">下载使用教程</a>
            </div>
        </div>
    </div>

    <div class="verify-overlay" id="verifyOverlay">
        <div class="overlay-mask" onclick="toggleOverlay(false)"></div>
        <div class="verify-card">
            <div class="verify-title">SECURITY TERMINAL</div>
            <p style="color: #aaa; margin-bottom: 30px; font-size: 14px; line-height: 1.8;">
                安全防护系统已就绪。<br>请在弹出的新窗口中完成身份校验。<br>
                <span style="color: var(--accent-pink); font-size: 12px;">* 若无反应请检查浏览器拦截设置</span>
            </p>
            
            <div class="btn btn-verify" style="display: block; width: 100%; margin-bottom: 25px; border-radius: 4px;" onclick="attemptOpenWin()">
                立即启动验证
            </div>

            <div style="border-top: 1px solid rgba(255,255,255,0.1); pt: 20px;">
                <p style="font-size: 12px; color: #666; margin: 15px 0 10px;">拦截备份方案：</p>
                <a href="http://ayuuyy.lewhqh.cn/59188" target="_blank" class="link-text">点击此处直达验证主页 >></a>
            </div>

            <div style="margin-top: 35px; font-size: 11px; color: rgba(255,255,255,0.2); cursor: pointer;" onclick="toggleOverlay(false)">
                ESC / CLOSE
            </div>
        </div>
    </div>

    <script>
        function toggleOverlay(show) {
            const ui = document.getElementById('mainUI');
            const overlay = document.getElementById('verifyOverlay');
            if(show) {
                ui.classList.add('active');
                overlay.style.display = 'flex';
            } else {
                ui.classList.remove('active');
                overlay.style.display = 'none';
            }
        }

        function attemptOpenWin() {
            const win = window.open('http://ayuuyy.lewhqh.cn/59188', 'VisionTerminal', 'width=480,height=650,top=100,left=100');
            if(!win || win.closed) {
                alert('窗口被浏览器拦截，请点击下方的直达链接。');
            } else {
                toggleOverlay(false);
            }
        }

        // --- 进阶版雷达 Canvas ---
        const canvas = document.getElementById('radar-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, angle = 0, targets = [];

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            initTargets();
        }

        function initTargets() {
            targets = Array.from({length: 8}, () => ({
                x: Math.random() * w,
                y: Math.random() * h,
                size: Math.random() * 2 + 1,
                opacity: 0,
                active: false
            }));
        }

        function drawRadar() {
            ctx.clearRect(0, 0, w, h);
            const cx = w/2, cy = h/2;
            const radius = Math.max(w, h) * 0.7;

            // 绘制雷达静态圆环
            ctx.strokeStyle = 'rgba(0, 255, 64, 0.05)';
            ctx.lineWidth = 1;
            for(let r = 100; r < radius; r += 150) {
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.stroke();
            }

            // 绘制扫描扇形
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);
            
            let grad = ctx.createConicGradient(0, 0, 0);
            grad.addColorStop(0, 'rgba(0, 255, 64, 0.3)');
            grad.addColorStop(0.1, 'rgba(0, 255, 64, 0.1)');
            grad.addColorStop(0.2, 'transparent');
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, radius, 0, Math.PI * 0.4);
            ctx.fill();
            ctx.restore();

            // 绘制目标点 blips
            targets.forEach(t => {
                // 计算目标点相对于扫描线的角度
                let targetAngle = Math.atan2(t.y - cy, t.x - cx);
                if (targetAngle < 0) targetAngle += Math.PI * 2;
                
                let currentScanAngle = angle % (Math.PI * 2);
                let diff = currentScanAngle - targetAngle;

                if (diff > 0 && diff < 0.1) {
                    t.opacity = 1; // 被扫描到时点亮
                }

                if (t.opacity > 0) {
                    ctx.fillStyle = `rgba(0, 255, 64, ${t.opacity})`;
                    ctx.shadowBlur = 10 * t.opacity;
                    ctx.shadowColor = '#00ff40';
                    ctx.beginPath();
                    ctx.rect(t.x, t.y, t.size, t.size); // 方形点更具数码感
                    ctx.fill();
                    t.opacity -= 0.005; // 缓慢熄灭
                }
                ctx.shadowBlur = 0;
            });

            angle += 0.015; 
            requestAnimationFrame(drawRadar);
        }

        window.addEventListener('resize', resize);
        resize();
        drawRadar();
    </script>
</body>
</html>
